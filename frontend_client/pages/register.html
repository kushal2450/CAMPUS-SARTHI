<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Campus Sarthi</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="login-header-enhanced">
        <div class="header-content">
            <div class="logo-section">
                <div class="logo">Project</div>
                <div class="campus-badge">New Account</div>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="login.html" class="nav-link"><i class="fas fa-sign-in-alt"></i> Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Registration Form Section -->
    <main class="login-main-enhanced">
        <div class="login-container-enhanced">
            <div class="login-card" style="max-width: 600px;">
                <div class="login-header">
                    <h2><i class="fas fa-user-plus"></i> Create Account</h2>
                    <p>Join the Campus Sarthi</p>
                </div>

                <form id="registerForm" class="login-form-enhanced">
                    <!-- User Type -->
                    <div class="form-group">
                        <label for="userType" class="form-label">
                            <i class="fas fa-user-tag"></i> I am a
                        </label>
                        <div class="select-container">
                            <select id="userType" name="role" required class="form-select">
                                <option value="">-- Select Role --</option>
                                <option value="student">🎓 Student</option>
                                <option value="faculty">👨‍🏫 Faculty</option>
                                <option value="recruiter">💼 Recruiter</option>
                            </select>
                            <i class="fas fa-chevron-down select-arrow"></i>
                        </div>
                    </div>

                    <!-- Full Name -->
                    <div class="form-group">
                        <label for="fullName" class="form-label">
                            <i class="fas fa-user"></i> Full Name
                        </label>
                        <div class="input-container">
                            <input type="text" id="fullName" name="name" required class="form-input" placeholder="Enter your full name">
                            <i class="fas fa-user input-icon"></i>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <div class="input-container">
                            <input type="email" id="email" name="email" required class="form-input" placeholder="Enter your email">
                            <i class="fas fa-envelope input-icon"></i>
                        </div>
                    </div>

                    <!-- Student Fields (shown only for students) -->
                    <div id="studentFields" class="hidden">
                        <div class="form-group">
                            <label for="rollNumber" class="form-label">
                                <i class="fas fa-id-card"></i> Roll Number
                            </label>
                            <div class="input-container">
                                <input type="text" id="rollNumber" name="rollNumber" class="form-input" placeholder="Enter your roll number">
                                <i class="fas fa-id-card input-icon"></i>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group half">
                                <label for="department" class="form-label">
                                    <i class="fas fa-building"></i> Department
                                </label>
                                <div class="select-container">
                                    <select id="department" name="department" class="form-select">
                                        <option value="">-- Select --</option>
                                        <option value="CSE">Computer Science</option>
                                        <option value="ECE">Electronics</option>
                                        <option value="ME">Mechanical</option>
                                        <option value="CE">Civil</option>
                                        <option value="EE">Electrical</option>
                                    </select>
                                    <i class="fas fa-chevron-down select-arrow"></i>
                                </div>
                            </div>

                            <div class="form-group half">
                                <label for="year" class="form-label">
                                    <i class="fas fa-calendar"></i> Year
                                </label>
                                <div class="select-container">
                                    <select id="year" name="year" class="form-select">
                                        <option value="">-- Select --</option>
                                        <option value="1">1st Year</option>
                                        <option value="2">2nd Year</option>
                                        <option value="3">3rd Year</option>
                                        <option value="4">4th Year</option>
                                    </select>
                                    <i class="fas fa-chevron-down select-arrow"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Faculty Fields (shown only for faculty) -->
                    <div id="facultyFields" class="hidden">
                        <div class="form-group">
                            <label for="facultyId" class="form-label">
                                <i class="fas fa-id-badge"></i> Faculty ID
                            </label>
                            <div class="input-container">
                                <input type="text" id="facultyId" name="facultyId" class="form-input" placeholder="Enter faculty ID">
                                <i class="fas fa-id-badge input-icon"></i>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="facultyDepartment" class="form-label">
                                <i class="fas fa-building"></i> Department
                            </label>
                            <div class="select-container">
                                <select id="facultyDepartment" name="department" class="form-select">
                                    <option value="">-- Select --</option>
                                    <option value="CSE">Computer Science</option>
                                    <option value="ECE">Electronics</option>
                                    <option value="ME">Mechanical</option>
                                    <option value="CE">Civil</option>
                                    <option value="EE">Electrical</option>
                                </select>
                                <i class="fas fa-chevron-down select-arrow"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Recruiter Fields (shown only for recruiters) -->
                    <div id="recruiterFields" class="hidden">
                        <div class="form-group">
                            <label for="company" class="form-label">
                                <i class="fas fa-building"></i> Company Name
                            </label>
                            <div class="input-container">
                                <input type="text" id="company" name="company" class="form-input" placeholder="Enter company name">
                                <i class="fas fa-building input-icon"></i>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="designation" class="form-label">
                                <i class="fas fa-briefcase"></i> Designation
                            </label>
                            <div class="input-container">
                                <input type="text" id="designation" name="designation" class="form-input" placeholder="Enter your designation">
                                <i class="fas fa-briefcase input-icon"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <div class="input-container">
                            <input type="password" id="password" name="password" required class="form-input" placeholder="Create a password">
                            <i class="fas fa-lock input-icon"></i>
                            <button type="button" class="password-toggle" onclick="togglePassword('password')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <small class="password-hint">Minimum 6 characters</small>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">
                            <i class="fas fa-lock"></i> Confirm Password
                        </label>
                        <div class="input-container">
                            <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm your password">
                            <i class="fas fa-lock input-icon"></i>
                            <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Terms and Conditions -->
                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="terms" required>
                            <span>I agree to the <a href="#" onclick="alert('Terms and conditions page coming soon!')">Terms of Service</a> and <a href="#" onclick="alert('Privacy policy page coming soon!')">Privacy Policy</a></span>
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="login-btn">
                        <span>Create Account</span>
                        <i class="fas fa-user-plus"></i>
                    </button>

                    <div class="register-link" style="text-align: center; margin-top: 1rem;">
                        Already have an account? <a href="login.html">Sign in here</a>
                    </div>
                </form>

                <div id="errorMessage" class="error-message" style="display: none; color: #f44336; text-align: center; margin-top: 1rem;"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="login-footer-enhanced">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy;Campus Sarthi. All rights reserved. | Join our campus community</p>
            </div>
        </div>
    </footer>

    <script src="../assets/js/api.js"></script>
    <script>
        // Show/hide fields based on user type
        document.getElementById('userType').addEventListener('change', function() {
            const studentFields = document.getElementById('studentFields');
            const facultyFields = document.getElementById('facultyFields');
            const recruiterFields = document.getElementById('recruiterFields');
            
            // Hide all first
            studentFields.classList.add('hidden');
            facultyFields.classList.add('hidden');
            recruiterFields.classList.add('hidden');
            
            // Show selected
            if (this.value === 'student') {
                studentFields.classList.remove('hidden');
            } else if (this.value === 'faculty') {
                facultyFields.classList.remove('hidden');
            } else if (this.value === 'recruiter') {
                recruiterFields.classList.remove('hidden');
            }
        });

        // Toggle password visibility
        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const toggleBtn = input.parentElement.querySelector('.password-toggle i');
            
            if (input.type === 'password') {
                input.type = 'text';
                toggleBtn.classList.remove('fa-eye');
                toggleBtn.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                toggleBtn.classList.remove('fa-eye-slash');
                toggleBtn.classList.add('fa-eye');
            }
        }

        // Handle form submission
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Get form values
            const role = document.getElementById('userType').value;
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            
            // Validate
            if (password !== confirmPassword) {
                showError('Passwords do not match!');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters long!');
                return;
            }
            
            if (!terms) {
                showError('Please accept the Terms and Conditions');
                return;
            }
            
            // Prepare user data
            const userData = {
                name,
                email,
                password,
                role
            };
            
            // Add role-specific fields
            if (role === 'student') {
                userData.rollNumber = document.getElementById('rollNumber').value;
                userData.department = document.getElementById('department').value;
                userData.year = document.getElementById('year').value;
            } else if (role === 'faculty') {
                userData.facultyId = document.getElementById('facultyId').value;
                userData.department = document.getElementById('facultyDepartment').value;
            } else if (role === 'recruiter') {
                userData.company = document.getElementById('company').value;
                userData.designation = document.getElementById('designation').value;
            }
            
            // Show loading state
            const submitBtn = document.querySelector('.login-btn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            submitBtn.disabled = true;
            
            try {
                // Call register API
                const data = await register(userData);
                
                // Show success message
                alert('Registration successful! Redirecting to dashboard...');
                
                // Redirect based on role
                if (data.user.role === 'student') {
                    window.location.href = 'student-dashboard.html';
                } else if (data.user.role === 'faculty') {
                    window.location.href = 'faculty-dashboard.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                showError(error.message || 'Registration failed. Please try again.');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            // Hide after 5 seconds
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
